services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: fabrikaos
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://factory:factory@db:5432/fabrikaos
    depends_on: [db]
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on: [backend]
    ports: ["3000:3000"]

volumes:
  pgdata:
