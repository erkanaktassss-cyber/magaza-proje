services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
      POSTGRES_DB: elite_production_ai
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes -d elite_production_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      DATABASE_URL: postgresql://mes:mes@db:5432/elite_production_ai?schema=public
      JWT_SECRET: change-this-secret-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports: ["3000:3000"]

volumes:
  pgdata:
